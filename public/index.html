<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一方生活 · 案場歷程</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Noto Sans TC","Microsoft JhengHei",system-ui,sans-serif;background:#f6f7f9;color:#1c2430;
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .wrap{max-width:520px;width:100%;text-align:center}
  h1{font-size:24px;margin-bottom:6px}
  .sub{font-size:13px;color:#6b7685;margin-bottom:28px}
  .cards{display:flex;flex-direction:column;gap:14px}
  a.card{display:block;text-decoration:none;background:#fff;border:1px solid #e3e7ec;border-radius:14px;
    padding:22px 24px;text-align:left;transition:.15s;color:inherit}
  a.card:hover{border-color:#d63384;box-shadow:0 6px 20px rgba(0,0,0,.06);transform:translateY(-1px)}
  a.card .t{font-size:17px;font-weight:700}
  a.card .d{font-size:12.5px;color:#6b7685;margin-top:4px;line-height:1.6}
  a.upload .t{color:#06C755}
</style>
</head>
<body>
<div class="wrap">
  <h1>案場歷程</h1>
  <div class="sub">一方生活 · LINE 對話上傳與案場時間軸</div>
  <div class="cards">
    <a class="card" href="case-history.html">
      <div class="t">📜 案場歷程時間軸</div>
      <div class="d">選案場看完整歷程：業主約、案場切換、房間出租/退租、工務修繕、請款、LINE 對話摘要…</div>
    </a>
    <a class="card upload" href="line-upload.html">
      <div class="t">＋ 上傳 LINE 對話</div>
      <div class="d">把案場 LINE 群組匯出的 txt 丟進來存檔（只存檔、不跑 AI）；同案場已傳過會自動略過。</div>
    </a>
  </div>
</div>
</body>
</html>
